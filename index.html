<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
    }

    h1 {
      font-size: 2rem;
      color: #4ecca3;
      letter-spacing: 0.2em;
      margin-bottom: 12px;
    }

    #scoreboard {
      display: flex;
      gap: 48px;
      margin-bottom: 16px;
      font-size: 1rem;
    }

    #scoreboard span { color: #a0a0c0; }
    #scoreboard strong { color: #4ecca3; }

    canvas {
      border: 2px solid #4ecca3;
      border-radius: 4px;
      box-shadow: 0 0 24px rgba(78, 204, 163, 0.3);
      background: #0f0f1a;
    }

    #message {
      margin-top: 20px;
      font-size: 1rem;
      color: #a0a0c0;
      height: 1.4em;
      text-align: center;
    }

    #message.highlight { color: #4ecca3; }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="scoreboard">
    <div><span>SCORE </span><strong id="score">0</strong></div>
    <div><span>BEST &nbsp;</span><strong id="best">0</strong></div>
  </div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div id="message">Press <strong>Enter</strong> or <strong>Space</strong> to start</div>


  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const COLS = 20, ROWS = 20;
    const CELL = canvas.width / COLS;
    const TICK = 120; // ms per frame

    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    const msgEl   = document.getElementById('message');

    let snake, dir, nextDir, foods, superFood, growPending, score, best, loopId, state;
    best = 0;

    function init() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      growPending = 0;
      scoreEl.textContent = 0;
      spawnFood();
      superFood = spawnSpecial();
      draw();
    }

    function occupiedBySnakeOrFoods(pos) {
      return snake.some(s => s.x === pos.x && s.y === pos.y) ||
             foods.some(f => f.x === pos.x && f.y === pos.y);
    }

    function spawnOneFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (occupiedBySnakeOrFoods(pos));
      return pos;
    }

    function spawnSpecial() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (
        occupiedBySnakeOrFoods(pos) ||
        (superFood && pos.x === superFood.x && pos.y === superFood.y)
      );
      return pos;
    }

    function spawnFood() {
      foods = [];
      foods.push(spawnOneFood());
      foods.push(spawnOneFood());
    }

    function addScore(n) {
      score += n;
      scoreEl.textContent = score;
      if (score > best) { best = score; bestEl.textContent = best; }
    }

    function tick() {
      dir = nextDir;
      const head = {
        x: (snake[0].x + dir.x + COLS) % COLS,
        y: (snake[0].y + dir.y + ROWS) % ROWS,
      };
      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return gameOver();
      }

      snake.unshift(head);
      const oldTail = snake.pop(); // always remove tail; growth is re-added below

      const eatenIndex = foods.findIndex(f => f.x === head.x && f.y === head.y);
      if (eatenIndex !== -1) {
        addScore(1);
        foods[eatenIndex] = spawnOneFood();
        growPending += 1;
      }

      if (superFood && head.x === superFood.x && head.y === superFood.y) {
        addScore(1);
        superFood = null; // consumed; no respawn (one per game)
        growPending += 2;
      }

      // Append pending growth segments at the tail end
      if (growPending > 0) {
        snake.push(oldTail);
        growPending--;
      }

      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Grid lines (subtle)
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
      }
      for (let j = 0; j <= ROWS; j++) {
        ctx.beginPath(); ctx.moveTo(0, j * CELL); ctx.lineTo(canvas.width, j * CELL); ctx.stroke();
      }

      // Regular food
      ctx.fillStyle = '#ff6b6b';
      foods.forEach(f => {
        ctx.beginPath();
        ctx.arc(f.x * CELL + CELL / 2, f.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
        ctx.fill();
      });

      // Super food (gold circle with glow, +2 tails)
      if (superFood) {
        const sx = superFood.x * CELL + CELL / 2;
        const sy = superFood.y * CELL + CELL / 2;
        ctx.save();
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(sx, sy, CELL / 2 - 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff8dc';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      }

      // Snake
      snake.forEach((seg, i) => {
        const t = i / snake.length;
        // Gradient from bright head to darker tail
        const r = Math.round(78  * (1 - t * 0.5));
        const g = Math.round(204 * (1 - t * 0.4));
        const b = Math.round(163 * (1 - t * 0.3));
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 4);
        ctx.fill();
      });
    }

    function gameOver() {
      clearInterval(loopId);
      state = 'dead';
      msgEl.textContent = `Game Over! Score: ${score} — Press Enter to restart`;
      msgEl.classList.add('highlight');
    }

    function startGame() {
      clearInterval(loopId);
      msgEl.textContent = 'Arrow keys or WASD to move  |  Space to pause';
      msgEl.classList.remove('highlight');
      state = 'running';
      init();
      loopId = setInterval(tick, TICK);
    }

    function togglePause() {
      if (state === 'running') {
        clearInterval(loopId);
        state = 'paused';
        msgEl.textContent = 'Paused — Press Space to resume';
        msgEl.classList.add('highlight');
      } else if (state === 'paused') {
        loopId = setInterval(tick, TICK);
        state = 'running';
        msgEl.textContent = 'Arrow keys or WASD to move  |  Space to pause';
        msgEl.classList.remove('highlight');
      }
    }

    document.addEventListener('keydown', e => {
      switch (e.key) {
        case 'ArrowUp':    case 'w': case 'W': if (dir.y !== 1)  nextDir = { x: 0, y: -1 }; break;
        case 'ArrowDown':  case 's': case 'S': if (dir.y !== -1) nextDir = { x: 0, y:  1 }; break;
        case 'ArrowLeft':  case 'a': case 'A': if (dir.x !== 1)  nextDir = { x: -1, y: 0 }; break;
        case 'ArrowRight': case 'd': case 'D': if (dir.x !== -1) nextDir = { x:  1, y: 0 }; break;
        case ' ':
          if (state === 'running' || state === 'paused') togglePause();
          else startGame();
          break;
        case 'Enter':
          if (state !== 'running') startGame();
          break;
      }
    });

    // Initial draw
    state = 'idle';
    init();
  </script>
</body>
</html>
